<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretty Village Musanze — Boutique Apartments in Rwanda</title>
    <meta name="description" content="Pretty Village Musanze — warm, boutique apartments at the foot of the Virunga volcanoes in Northern Rwanda." />
    <meta name="author" content="Pretty Village Musanze" />
    <meta property="og:title" content="Pretty Village Musanze — Boutique Apartments" />
    <meta property="og:description" content="A warm, quiet retreat at the foot of the Virunga volcanoes in Musanze, Rwanda." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon & Fonts -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      :root {
        --forest: #122119;
        --fern: #a7c4a0;
        --mist: #f4f6f3;
        --moss: #2d4536;
        --earth: #1a1c18;
        --font-serif: 'Playfair Display', serif;
        --font-sans: 'Outfit', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-sans);
        background-color: var(--forest);
        color: var(--mist);
        overflow-x: hidden;
        line-height: 1.6;
      }
      h1, h2, h3, .serif { font-family: var(--font-serif); }
      .eyebrow {
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 0.75rem;
      }
      /* Fallback static layout styles when JS is loading */
      .static-header {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 2rem;
        background: rgba(18, 33, 25, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(244, 246, 243, 0.1);
      }
      .static-hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 8rem 2rem 4rem;
        background: linear-gradient(to bottom, rgba(18, 33, 25, 0.7), rgba(18, 33, 25, 0.95)), url('/images/exterior-night.jpg') center/cover no-repeat;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 2rem;
        border-radius: 9999px;
        background-color: var(--fern);
        color: var(--forest);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        background-color: var(--mist);
        color: var(--forest);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <!-- React Mount Root -->
    <div id="root">
      <!-- Progressive Enhancement Fallback HTML for instant static indexing -->
      <header class="static-header">
        <div class="eyebrow" style="color: var(--fern);">Pretty Village Musanze</div>
        <nav style="display: flex; gap: 1.5rem;">
          <a href="#stay" style="color: var(--mist); text-decoration: none; font-size: 0.85rem;">Suites</a>
          <a href="#services" style="color: var(--mist); text-decoration: none; font-size: 0.85rem;">Services</a>
          <a href="#contact" style="color: var(--mist); text-decoration: none; font-size: 0.85rem;">Reserve</a>
        </nav>
      </header>

      <main class="static-hero">
        <p class="eyebrow" style="color: var(--fern); margin-bottom: 1rem;">Musanze · Northern Province · Rwanda</p>
        <h1 style="font-size: clamp(2.5rem, 6vw, 5rem); line-height: 1.1; max-width: 800px; margin-bottom: 1.5rem;">
          Where the volcanoes <em>whisper</em> at dawn.
        </h1>
        <p style="font-size: 1.125rem; color: rgba(244, 246, 243, 0.8); max-width: 600px; margin-bottom: 2.5rem;">
          Boutique luxury apartments in Musanze at the foot of the Virunga volcanoes. Every morning begins with mist, crisp mountain air, and bird song.
        </p>
        <div>
          <a href="#contact" class="btn-primary">Reserve Your Stay &rarr;</a>
        </div>
      </main>
    </div>

    <!-- React Application Entry Module -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
